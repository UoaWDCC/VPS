name: Frontend CI

on:
  push:
    branches: [ master ]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
      - ".prettierrc.json"
  pull_request:
    branches: [ master ]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
      - ".prettierrc.json"

jobs:
  lint-format:
    name: lint & format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock
      - run: yarn install --frozen-lockfile
      - run: yarn prettier
      - run: yarn lint
